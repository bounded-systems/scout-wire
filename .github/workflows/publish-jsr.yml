name: publish-jsr
on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]
  # Manual escape hatch: a tag pushed by the default GITHUB_TOKEN does NOT start
  # this workflow (GitHub loop-prevention), so when tag-release cuts a tag without
  # a RELEASE_TOKEN, dispatch this to publish the version currently on the branch.
  workflow_dispatch: {}
permissions:
  contents: read
  id-token: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x
      - run: npx jsr publish
