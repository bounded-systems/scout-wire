name: cut release

# mint is the only thing that cuts a release — via a PR, never a push to main.
# Dispatch this to run `mint version` in CI and open a RELEASE PR (the bump +
# changelog + consumed .release/ intents). Merging that PR puts the new version
# on main; tag-release.yml then cuts the v<version> tag, which drives
# publish-jsr.yml + release.yml. No branch-protection exception is needed — CI
# only pushes a release branch and opens a PR.
on:
  workflow_dispatch: {}

permissions:
  contents: write # push the release branch
  pull-requests: write # open the release PR

jobs:
  cut:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: bounded-systems/mint
          ref: v0.5.0
          path: .mint
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
      - name: Install mint deps
        working-directory: .mint
        run: npm ci --no-audit --no-fund
      - name: mint version → open a release PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "mint"
          git config user.email "noreply@anthropic.com"
          out="$(node .mint/mint.mjs version)"; printf '%s\n' "$out"
          next="$(printf '%s\n' "$out" | grep -oE '→ [0-9]+\.[0-9]+\.[0-9]+' | head -1 | tr -dc '0-9.')"
          if [ -z "$next" ]; then
            echo "no intents — nothing to release"; exit 0
          fi
          branch="release/v${next}"
          git switch -c "$branch"
          git add -A
          git commit -m "release: v${next}"
          git push -u origin "$branch"
          gh pr create --base main --head "$branch" \
            --title "release: v${next}" \
            --body "Cut by \`mint version\` — deterministic bump + changelog + consumed intents. Merge to put v${next} on main; \`tag-release\` then cuts the v${next} tag → publish + provenance."
